services:
  # ── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pharmacy_sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - pharmacy_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1", "-No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pharmacy_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pharmacy_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Pharmacy & Billing API ──────────────────────────────────────────────────
  pharmacy-api:
    build:
      context: .
      dockerfile: src/PharmacyBilling.API/Dockerfile
    container_name: pharmacy_api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PharmacyDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=True"
      Jwt__Secret: "PharmacyBillingServiceSecretKey2024!@#$%^&*()_+ThisMustBe32CharsOrMore"
      Jwt__Issuer: "PharmacyBillingService"
      Jwt__Audience: "PharmacyClients"
      Jwt__ExpiryMinutes: "60"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - pharmacy_network
    restart: unless-stopped
    volumes:
      - api_logs:/app/logs

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmacy_frontend
    ports:
      - "3000:80"
    depends_on:
      - pharmacy-api
    networks:
      - pharmacy_network
    restart: unless-stopped

volumes:
  sqlserver_data:
  rabbitmq_data:
  api_logs:

networks:
  pharmacy_network:
    driver: bridge
    name: pharmacy_network
